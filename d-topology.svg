<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Network topology: full node over mini-node relays over two peer players">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b07e"/></marker>
    <marker id="ah2s" markerWidth="9" markerHeight="9" refX="1" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#0a7d5a"/></marker>
    <marker id="ah2e" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0a7d5a"/></marker>
  </defs>
  <style>
    .hdr{fill:#0a7d5a;font-weight:700;font-size:16px}
    .li{fill:#28323a;font-size:12.5px}
    .sub{fill:#5b6670;font-size:12.5px}
    .role{fill:#0a7d5a;font-size:11.5px;font-weight:600}
    .arw{stroke:#15b07e;stroke-width:2;fill:none}
    .lbl{fill:#5b6670;font-size:11.5px}
  </style>

  <!-- FULL NODE -->
  <rect x="170" y="18" width="420" height="140" rx="14" fill="#f2faf7" stroke="#bfe0d3" stroke-width="1.5"/>
  <text x="380" y="46" text-anchor="middle" class="hdr">FULL NODE</text>
  <text x="198" y="73" class="li">•  produces &amp; validates blocks (LevelDB chain)</text>
  <text x="198" y="95" class="li">•  broker: who holds which song (SwarmIndex / DB2)</text>
  <text x="198" y="117" class="li">•  runs the play-session pipeline</text>
  <text x="198" y="139" class="li">•  serves wallet + chain queries</text>

  <!-- control RPC arrow -->
  <line x1="380" y1="158" x2="380" y2="204" class="arw" marker-end="url(#ah)"/>
  <text x="392" y="176" class="lbl">control RPCs</text>
  <text x="392" y="192" class="lbl">session.* · stream.open · fingerprint.submit · wallet.*</text>

  <!-- MINI-NODES -->
  <rect x="205" y="208" width="350" height="96" rx="14" fill="#fff" stroke="#c9d6d0" stroke-width="1.5"/>
  <text x="380" y="236" text-anchor="middle" class="hdr">MINI-NODES</text>
  <text x="380" y="260" text-anchor="middle" class="sub">relays / NAT bridges — earn 1 token per stream</text>
  <text x="380" y="282" text-anchor="middle" class="sub">the public IPs that listeners dial into</text>

  <!-- relayed audio arrows -->
  <line x1="330" y1="304" x2="205" y2="414" class="arw" marker-end="url(#ah)"/>
  <line x1="430" y1="304" x2="555" y2="414" class="arw" marker-end="url(#ah)"/>
  <text x="380" y="360" text-anchor="middle" class="lbl">relayed audio (binary frames)</text>

  <!-- PLAYERS -->
  <rect x="70" y="418" width="245" height="96" rx="14" fill="#fff" stroke="#c9d6d0" stroke-width="1.5"/>
  <text x="192" y="452" text-anchor="middle" class="hdr">PLAYER A</text>
  <text x="192" y="476" text-anchor="middle" class="role">listener + seeder + wallet</text>

  <rect x="445" y="418" width="245" height="96" rx="14" fill="#fff" stroke="#c9d6d0" stroke-width="1.5"/>
  <text x="567" y="452" text-anchor="middle" class="hdr">PLAYER B</text>
  <text x="567" y="476" text-anchor="middle" class="role">listener + seeder + wallet</text>

  <!-- swarm double arrow -->
  <line x1="322" y1="466" x2="438" y2="466" stroke="#0a7d5a" stroke-width="2" marker-start="url(#ah2s)" marker-end="url(#ah2e)"/>
  <text x="380" y="456" text-anchor="middle" class="lbl">swarm</text>
  <text x="380" y="502" text-anchor="middle" class="lbl">pieces via relay</text>
</svg>
