<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Sequence diagram of a play: discover, fetch, account, settle across listener, full node, mini-node and seeder">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b07e"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8aa0a9"/></marker>
  </defs>
  <style>
    .aname{fill:#0a7d5a;font-weight:700;font-size:13px}
    .life{stroke:#cdd8d3;stroke-width:1.5;stroke-dasharray:3 4}
    .msg{stroke:#15b07e;stroke-width:2}
    .ret{stroke:#8aa0a9;stroke-width:1.6;stroke-dasharray:5 4}
    .mlbl{fill:#28323a;font-size:11.5px}
    .note{fill:#5b6670;font-size:11px;font-style:italic}
    .num{fill:#fff;font-weight:800;font-size:12px}
    .phase{fill:#0a7d5a;font-weight:700;font-size:10px;letter-spacing:.06em}
  </style>

  <!-- actors -->
  <g>
    <rect x="48" y="16" width="124" height="38" rx="9" fill="#f2faf7" stroke="#bfe0d3"/><text x="110" y="40" text-anchor="middle" class="aname">LISTENER</text>
    <rect x="278" y="16" width="124" height="38" rx="9" fill="#f2faf7" stroke="#bfe0d3"/><text x="340" y="40" text-anchor="middle" class="aname">FULL NODE</text>
    <rect x="498" y="16" width="124" height="38" rx="9" fill="#f2faf7" stroke="#bfe0d3"/><text x="560" y="40" text-anchor="middle" class="aname">MINI-NODE</text>
    <rect x="678" y="16" width="124" height="38" rx="9" fill="#f2faf7" stroke="#bfe0d3"/><text x="740" y="40" text-anchor="middle" class="aname">SEEDER</text>
  </g>
  <!-- lifelines -->
  <line x1="110" y1="54" x2="110" y2="536" class="life"/>
  <line x1="340" y1="54" x2="340" y2="536" class="life"/>
  <line x1="560" y1="54" x2="560" y2="536" class="life"/>
  <line x1="740" y1="54" x2="740" y2="536" class="life"/>

  <!-- phase markers -->
  <circle cx="20" cy="96" r="11" fill="#15b07e"/><text x="20" y="100" text-anchor="middle" class="num">1</text><text x="8" y="118" class="phase">DISCOVER</text>
  <circle cx="20" cy="174" r="11" fill="#15b07e"/><text x="20" y="178" text-anchor="middle" class="num">2</text><text x="14" y="196" class="phase">FETCH</text>
  <circle cx="20" cy="298" r="11" fill="#15b07e"/><text x="20" y="302" text-anchor="middle" class="num">3</text><text x="8" y="320" class="phase">ACCOUNT</text>
  <circle cx="20" cy="420" r="11" fill="#15b07e"/><text x="20" y="424" text-anchor="middle" class="num">4</text><text x="12" y="442" class="phase">SETTLE</text>

  <!-- 1 discover -->
  <text x="225" y="90" text-anchor="middle" class="mlbl">stream.open(hash) — who has this?</text>
  <line x1="110" y1="98" x2="338" y2="98" class="msg" marker-end="url(#g)"/>
  <text x="225" y="118" text-anchor="middle" class="mlbl">peers + MANIFEST</text>
  <line x1="340" y1="124" x2="112" y2="124" class="ret" marker-end="url(#gr)"/>

  <!-- 2 fetch -->
  <text x="335" y="170" text-anchor="middle" class="mlbl">swarm.fetch(N..M)</text>
  <line x1="110" y1="178" x2="558" y2="178" class="msg" marker-end="url(#g)"/>
  <text x="650" y="170" text-anchor="middle" class="mlbl">relay.forward</text>
  <line x1="560" y1="178" x2="738" y2="178" class="msg" marker-end="url(#g)"/>
  <text x="425" y="208" text-anchor="middle" class="mlbl">binary F-frame pieces  (paced ≤4 Mbit/s)</text>
  <line x1="740" y1="216" x2="112" y2="216" class="ret" marker-end="url(#gr)"/>
  <text x="425" y="240" text-anchor="middle" class="note">each 256 KB piece SHA-256-checked vs manifest — a bad piece is refetched from another seeder</text>

  <!-- 3 account -->
  <text x="225" y="294" text-anchor="middle" class="mlbl">session.start</text>
  <line x1="110" y1="302" x2="338" y2="302" class="msg" marker-end="url(#g)"/>
  <text x="225" y="326" text-anchor="middle" class="mlbl">session.heartbeat — position / 5s   ↻</text>
  <line x1="110" y1="334" x2="338" y2="334" class="msg" marker-end="url(#g)"/>
  <text x="225" y="358" text-anchor="middle" class="mlbl">session.complete (+ seeder &amp; relay addr)</text>
  <line x1="110" y1="366" x2="338" y2="366" class="msg" marker-end="url(#g)"/>

  <!-- 4 settle -->
  <rect x="224" y="388" width="232" height="70" rx="10" fill="#eef7f3" stroke="#bfe0d3"/>
  <text x="340" y="409" text-anchor="middle" class="mlbl">validate: ≥50% listen +</text>
  <text x="340" y="427" text-anchor="middle" class="mlbl">heartbeat density · sign PlayProof</text>
  <text x="340" y="445" text-anchor="middle" class="mlbl">· mint 5 reward lanes → block</text>
  <text x="225" y="484" text-anchor="middle" class="mlbl">balances move</text>
  <line x1="340" y1="490" x2="112" y2="490" class="ret" marker-end="url(#gr)"/>
</svg>
