<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 210" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Session lifecycle: start, heartbeat while playing, complete, then gates and mint">
  <defs><marker id="ss" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b07e"/></marker></defs>
  <style>
    .hdr{fill:#0a7d5a;font-weight:700;font-size:13.5px}
    .sub{fill:#5b6670;font-size:11px}
    .arw{stroke:#15b07e;stroke-width:2;fill:none}
    .cap{fill:#28323a;font-size:11.5px}
  </style>

  <!-- loop -->
  <path d="M440,58 C440,26 340,26 340,58" class="arw" marker-end="url(#ss)"/>
  <text x="390" y="22" text-anchor="middle" class="sub">↻ repeat while playing</text>

  <rect x="20" y="60" width="210" height="84" rx="12" fill="#fff" stroke="#c9d6d0"/>
  <text x="125" y="96" text-anchor="middle" class="hdr">session.start</text>
  <text x="125" y="118" text-anchor="middle" class="sub">node opens a session</text>
  <text x="125" y="133" text-anchor="middle" class="sub">(content_hash, listener)</text>

  <line x1="230" y1="102" x2="288" y2="102" class="arw" marker-end="url(#ss)"/>

  <rect x="290" y="60" width="200" height="84" rx="12" fill="#f2faf7" stroke="#bfe0d3"/>
  <text x="390" y="96" text-anchor="middle" class="hdr">session.heartbeat</text>
  <text x="390" y="118" text-anchor="middle" class="sub">reports playback</text>
  <text x="390" y="133" text-anchor="middle" class="sub">position every ~5s</text>

  <line x1="490" y1="102" x2="548" y2="102" class="arw" marker-end="url(#ss)"/>

  <rect x="550" y="60" width="210" height="84" rx="12" fill="#fff" stroke="#c9d6d0"/>
  <text x="655" y="96" text-anchor="middle" class="hdr">session.complete</text>
  <text x="655" y="118" text-anchor="middle" class="sub">"done" + seeder &amp;</text>
  <text x="655" y="133" text-anchor="middle" class="sub">relay addresses</text>

  <text x="390" y="180" text-anchor="middle" class="cap">on complete →  coverage ≥50% + heartbeat-density gates  →  sign PlayProof  →  mint</text>
</svg>
