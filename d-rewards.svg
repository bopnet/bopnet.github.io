<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 356" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Five reward lanes minted per qualifying play, and the post-10000-play burn">
  <defs><marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b07e"/></marker></defs>
  <style>
    .h{fill:#10161b;font-weight:700;font-size:14.5px}
    .tag{fill:#e7f7f0;stroke:#bfe0d3}
    .tagt{fill:#0a7d5a;font-weight:700;font-size:12px}
    .desc{fill:#28323a;font-size:12.5px}
    .q{fill:#5b6670;font-size:11.5px}
    .arw{stroke:#15b07e;stroke-width:2}
    .burn{fill:#b5541f;font-weight:700;font-size:12.5px}
    .burnt{fill:#7a4a2e;font-size:12px}
  </style>

  <text x="390" y="28" text-anchor="middle" class="h">ONE qualifying play  →  mint 1 token to each lane</text>
  <rect x="28" y="44" width="724" height="200" rx="14" fill="#fff" stroke="#c9d6d0"/>

  <!-- row template: tag + arrow + desc -->
  <g>
    <rect x="50" y="62" width="130" height="26" rx="8" class="tag"/><text x="115" y="80" text-anchor="middle" class="tagt">ARTIST</text>
    <line x1="188" y1="75" x2="212" y2="75" class="arw" marker-end="url(#r)"/>
    <text x="222" y="79" class="desc">escrow_address(artist)   <tspan class="q">· released on KYC</tspan></text>

    <rect x="50" y="98" width="130" height="26" rx="8" class="tag"/><text x="115" y="116" text-anchor="middle" class="tagt">FULL NODE</text>
    <line x1="188" y1="111" x2="212" y2="111" class="arw" marker-end="url(#r)"/>
    <text x="222" y="115" class="desc">the validator that processed the play</text>

    <rect x="50" y="134" width="130" height="26" rx="8" class="tag"/><text x="115" y="152" text-anchor="middle" class="tagt">DISCOVERER</text>
    <line x1="188" y1="147" x2="212" y2="147" class="arw" marker-end="url(#r)"/>
    <text x="222" y="151" class="desc">the listener   <tspan class="q">· pre-threshold tier only</tspan></text>

    <rect x="50" y="170" width="130" height="26" rx="8" class="tag"/><text x="115" y="188" text-anchor="middle" class="tagt">SEEDER</text>
    <line x1="188" y1="183" x2="212" y2="183" class="arw" marker-end="url(#r)"/>
    <text x="222" y="187" class="desc">the peer that served the bytes   <tspan class="q">· skip if = listener</tspan></text>

    <rect x="50" y="206" width="130" height="26" rx="8" class="tag"/><text x="115" y="224" text-anchor="middle" class="tagt">MINI-NODE</text>
    <line x1="188" y1="219" x2="212" y2="219" class="arw" marker-end="url(#r)"/>
    <text x="222" y="223" class="desc">the relay that carried the stream</text>
  </g>

  <!-- burn note -->
  <rect x="28" y="262" width="724" height="76" rx="12" fill="#fbf1e8" stroke="#ecd9c5"/>
  <text x="48" y="290" class="burn">After 10,000 plays</text>
  <text x="170" y="290" class="burnt">— artist · node · seeder · mini-node lanes continue;</text>
  <text x="48" y="316" class="burnt">the DISCOVERER lane is replaced by a listener <tspan class="burn">BURN</tspan> that grows cubically as supply approaches the cap.</text>
</svg>
